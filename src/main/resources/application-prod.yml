# Perfil produção (Ubuntu / Docker): SPRING_PROFILES_ACTIVE=prod
# Swagger desligado por padrão; opcional: GLPI_ENABLE_SWAGGER=true (exige X-API-Key)
springdoc:
  api-docs:
    enabled: ${GLPI_ENABLE_SWAGGER:false}
  swagger-ui:
    enabled: ${GLPI_ENABLE_SWAGGER:false}

management:
  endpoints:
    web:
      exposure:
        include: health

server:
  error:
    include-message: never
    include-stacktrace: never
    include-exception: false
