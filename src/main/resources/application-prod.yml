# Perfil produção (Ubuntu / Docker): SPRING_PROFILES_ACTIVE=prod
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health

server:
  error:
    include-message: never
    include-stacktrace: never
    include-exception: false
