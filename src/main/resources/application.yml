glpi:
  test-on-startup: false
  health:
    enabled: true
  security:
    api-key: ${GLPI_API_KEY:}
  api:
    # LEGACY_APIREST (apirest.php) ou LEGACY_VIA_ROUTER (api.php/v1). Ver docs/API_VALIDATION.md
    style: ${GLPI_API_STYLE:LEGACY_APIREST}
    base-url: ${GLPI_API_BASE_URL:http://localhost/glpi/apirest.php}
    app-token: ${GLPI_APP_TOKEN:}
    user-token: ${GLPI_USER_TOKEN:}
  sync:
    enabled: false
    delay-ms: 500
    lookup-range: 0-9999
    schedule-delay-ms: 3600000
    input-path: ${GLPI_SYNC_INPUT:}
  custom-assets:
    types:
      starlink:
        item-type: ${GLPI_ITEMTYPE_STARLINK:Glpi\\Asset\\AssetDefinition/Starlink}
        natural-key-field: name
      chip:
        item-type: ${GLPI_ITEMTYPE_CHIP:Glpi\\Asset\\AssetDefinition/Chip}
        natural-key-field: custom_iccid
      celular:
        item-type: ${GLPI_ITEMTYPE_CELULAR:Glpi\\Asset\\AssetDefinition/Celular}
        natural-key-field: custom_imei
      colaborador:
        item-type: ${GLPI_ITEMTYPE_COLABORADOR:Glpi\\Asset\\AssetDefinition/Colaborador}


springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
    display-request-duration: true
    persist-authorization: true
  show-actuator: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

spring:
  application:
    name: glpi-integration
  config:
    import: optional:classpath:application-local.properties
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB
