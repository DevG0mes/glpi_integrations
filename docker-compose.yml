services:
  glpi-integration:
    build: .
    image: glpi-integration:local
    container_name: glpi-integration
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8081}:8081"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      GLPI_API_KEY: ${GLPI_API_KEY:-}
      GLPI_API_STYLE: ${GLPI_API_STYLE:-LEGACY_APIREST}
      GLPI_API_BASE_URL: ${GLPI_API_BASE_URL:-http://host.docker.internal/glpi/apirest.php}
      GLPI_APP_TOKEN: ${GLPI_APP_TOKEN:-}
      GLPI_USER_TOKEN: ${GLPI_USER_TOKEN:-}
      GLPI_ITEMTYPE_STARLINK: ${GLPI_ITEMTYPE_STARLINK:-Glpi\\Asset\\AssetDefinition/Starlink}
      GLPI_ITEMTYPE_CHIP: ${GLPI_ITEMTYPE_CHIP:-Glpi\\Asset\\AssetDefinition/Chip}
      GLPI_ITEMTYPE_CELULAR: ${GLPI_ITEMTYPE_CELULAR:-Glpi\\Asset\\AssetDefinition/Celular}
      GLPI_SYNC_INPUT: ${GLPI_SYNC_INPUT:-}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=75.0}
    volumes:
      - ./data:/data:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8081/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
